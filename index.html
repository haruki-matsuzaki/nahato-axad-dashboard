<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ナハト版AXAD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css?v=20260707-45">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="ナビゲーション">
        <div class="brand">
          <div class="brand-mark">AX</div>
          <div>
            <div class="brand-title">AXAD</div>
            <div class="brand-subtitle">ナハトシート版</div>
          </div>
        </div>
        <div class="sidebar-status">
          <span class="status-dot"></span>
          <span id="sidebarUpdated">最終更新 --</span>
        </div>
        <nav class="side-nav">
          <a href="#home" class="nav-link active" data-view="home">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M3.5 10.8 12 4l8.5 6.8" />
                <path d="M5.5 9.8v9.7h4.8v-5.7h3.4v5.7h4.8V9.8" />
              </svg>
            </span>
            <span>ホーム</span>
          </a>
          <a href="#mypage" class="nav-link" data-view="mypage">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4 5.5h16" />
                <path d="M4 12h16" />
                <path d="M4 18.5h16" />
                <path d="M8 3.5v17" />
              </svg>
            </span>
            <span>案件別日時</span>
          </a>
          <a href="#overall" class="nav-link" data-view="overall">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <rect x="4" y="5" width="16" height="14" rx="1.5" />
                <path d="M4 9h16" />
                <path d="M4 13h16" />
                <path d="M9 5v14" />
                <path d="M14 5v14" />
              </svg>
            </span>
            <span>全体売上表</span>
          </a>
        </nav>
        <div class="sidebar-footer">GitHub Pages</div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-left">
            <button class="icon-button" id="menuToggle" type="button" aria-label="メニュー">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M4 7h16" />
                <path d="M4 12h16" />
                <path d="M4 17h16" />
              </svg>
            </button>
            <div class="clock-label" aria-label="現在時刻">
              <span id="dateLabel" class="clock-date">--</span>
              <span id="timeLabel" class="clock-time">-- JST</span>
            </div>
            <div class="weather-pill" aria-label="東京の天気">
              <span class="weather-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M7.8 17.5h8.1a3.7 3.7 0 0 0 .4-7.4 5.2 5.2 0 0 0-10-1.5 4.5 4.5 0 0 0 1.5 8.9Z" />
                  <path d="M5.6 5.3 4.3 4" />
                  <path d="M10.5 3.6V2" />
                  <path d="M15.3 5.3 16.6 4" />
                  <path d="M3.2 10.1H1.6" />
                </svg>
              </span>
              <span id="weatherLabel">東京 --℃ / --</span>
            </div>
          </div>
          <div class="topbar-actions">
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="ライトモードに切り替え" title="ライトモードに切り替え"></button>
            <div class="profile-chip">
              <span class="avatar">ナ</span>
              <span class="profile-text">
                <span class="profile-name">ナハトシート</span>
                <span class="profile-role">社内AXAD</span>
              </span>
              <span class="profile-caret" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="m7 10 5 5 5-5" />
                </svg>
              </span>
            </div>
          </div>
        </header>

        <div class="floating-scroll-proxy" id="floatingScrollProxy" hidden aria-label="表示中の表の横スクロール"><div></div></div>

        <section class="content">
          <div class="page-head">
            <div>
              <div class="eyebrow" id="sourceLabel" hidden></div>
              <h1 id="pageTitle">ホーム</h1>
            </div>
            <div class="filter-row">
              <label class="field">
                <span class="field-label">月</span>
                <span class="control control-select">
                  <select id="monthSelect"></select>
                  <span class="control-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false"><path d="m7 10 5 5 5-5" /></svg>
                  </span>
                </span>
              </label>
              <label class="field">
                <span class="field-label">開始</span>
                <span class="control control-date">
                  <input id="startDate" type="date">
                  <span class="control-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path d="M7 3.8v3" />
                      <path d="M17 3.8v3" />
                      <path d="M4.5 9.4h15" />
                      <rect x="4.5" y="5.8" width="15" height="14" rx="2" />
                    </svg>
                  </span>
                </span>
              </label>
              <label class="field">
                <span class="field-label">終了</span>
                <span class="control control-date">
                  <input id="endDate" type="date">
                  <span class="control-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                      <path d="M7 3.8v3" />
                      <path d="M17 3.8v3" />
                      <path d="M4.5 9.4h15" />
                      <rect x="4.5" y="5.8" width="15" height="14" rx="2" />
                    </svg>
                  </span>
                </span>
              </label>
              <label class="field">
                <span class="field-label">案件</span>
                <span class="control control-select control-wide">
                  <select id="projectSelect"></select>
                  <span class="control-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false"><path d="m7 10 5 5 5-5" /></svg>
                  </span>
                </span>
              </label>
              <label class="field">
                <span class="field-label">媒体</span>
                <span class="control control-select">
                  <select id="mediaSelect"></select>
                  <span class="control-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false"><path d="m7 10 5 5 5-5" /></svg>
                  </span>
                </span>
              </label>
            </div>
          </div>

          <div id="notice" class="notice" hidden></div>

          <section class="kpi-grid" id="kpiGrid"></section>

          <section id="homeView" class="view active">
            <div class="dashboard-grid">
              <section class="panel span-7">
                <div class="panel-head">
                  <div>
                    <h2>日別推移</h2>
                    <p>売上・粗利・消化金額・ROAS</p>
                  </div>
                  <div class="metric-tabs" id="chartMetricTabs"></div>
                </div>
                <div id="dailyChart" class="daily-chart"></div>
              </section>

              <section class="panel span-5">
                <div class="panel-head">
                  <div>
                    <h2>媒体別</h2>
                    <p>粗利構成</p>
                  </div>
                </div>
                <div id="mediaBreakdown" class="rank-list"></div>
              </section>

              <section class="panel span-6">
                <div class="panel-head">
                  <div>
                    <h2>案件別</h2>
                    <p>粗利順</p>
                  </div>
                </div>
                <div id="projectTop" class="rank-list"></div>
              </section>

              <section class="panel span-6">
                <div class="panel-head">
                  <div>
                    <h2>期間サマリー</h2>
                    <p id="periodLabel">--</p>
                  </div>
                </div>
                <div id="summaryPanel" class="summary-grid"></div>
              </section>
            </div>
          </section>

          <section id="mypageView" class="view">
            <section class="panel">
              <div class="panel-head">
                <div>
                  <h2>案件別日時_全体_固定用</h2>
                  <p id="tableCount">--</p>
                </div>
                <div class="table-hint">案件名クリックで媒体別</div>
              </div>
              <div class="horizontal-scroll-proxy" id="detailTableScrollProxy" aria-label="案件別日時の横スクロール"><div></div></div>
              <div class="table-wrap" id="detailTableWrap">
                <table class="sheet-table">
                  <thead id="sheetTableHead"></thead>
                  <tbody id="detailTable"></tbody>
                </table>
              </div>
            </section>
          </section>

          <section id="overallView" class="view">
            <section class="panel overall-panel">
              <div class="panel-head">
                <div>
                  <h2>全体売上表</h2>
                  <p id="overallSheetMeta">--</p>
                </div>
              </div>
              <div class="horizontal-scroll-proxy" id="overallSalesScrollProxy" aria-label="全体売上表の横スクロール"><div></div></div>
              <div class="overall-sheet-wrap" id="overallSalesTable"></div>
            </section>

            <section class="panel overall-panel">
              <div class="panel-head">
                <div>
                  <h2>全体売上表（58行目以降）</h2>
                  <p id="overallBusinessMeta">--</p>
                </div>
                <button class="small-button" id="overallBusinessColumnToggle" type="button" aria-pressed="false">詳細列を表示</button>
              </div>
              <div class="horizontal-scroll-proxy" id="overallBusinessScrollProxy" aria-label="全体売上表 58行目以降の横スクロール"><div></div></div>
              <div class="overall-sheet-wrap" id="overallBusinessTable"></div>
            </section>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="assets/app.js?v=20260707-51"></script>
  </body>
</html>
