name: Check Cloudflare Pages deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nacht-axad-cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check Cloudflare Pages deployment
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          CLOUDFLARE_EXPECTED_SHA: ${{ github.sha }}
          CLOUDFLARE_DEPLOY_WAIT_SECONDS: "600"
          CLOUDFLARE_DEPLOY_INTERVAL_SECONDS: "30"
        run: node scripts/check-cloudflare-pages-deploy.mjs
