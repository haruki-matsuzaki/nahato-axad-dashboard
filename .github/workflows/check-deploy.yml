name: Check Cloudflare Pages deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nacht-axad-cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check deploy secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
        run: node scripts/check-automation-secrets.mjs --profile deploy

      - name: Check Cloudflare Pages deployment
        id: cloudflare-deploy
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          CLOUDFLARE_EXPECTED_SHA: ${{ github.sha }}
          CLOUDFLARE_DEPLOY_WAIT_SECONDS: "600"
          CLOUDFLARE_DEPLOY_INTERVAL_SECONDS: "30"
        run: node scripts/check-cloudflare-pages-deploy.mjs

      - name: Check production site
        id: production-site
        continue-on-error: true
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          PRODUCTION_CHECK_REQUIRE_200: ${{ secrets.PRODUCTION_CHECK_REQUIRE_200 }}
        run: node scripts/check-production-site.mjs

      - name: Send deploy failure alert
        if: always() && (steps.cloudflare-deploy.outcome == 'failure' || steps.production-site.outcome == 'failure')
        env:
          ALERT_REASON: deploy_failed
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ALERT_ROOM_ID: "398449612"
        run: node scripts/send-chatwork-alert.mjs

      - name: Fail when deploy check failed
        if: steps.cloudflare-deploy.outcome == 'failure' || steps.production-site.outcome == 'failure'
        run: exit 1
