name: Validate Nacht AXAD static data

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate JavaScript syntax
        run: |
          node --check assets/app.js
          node --check functions/api/active-users.js
          node --check scripts/check-cloudflare-pages-deploy.mjs
          node --check scripts/check-data-quality.mjs
          node --check scripts/google-auth.mjs
          node --check scripts/monitor-update-schedule.mjs
          node --check scripts/sync-overall-sales-top-rows.mjs
          node --check scripts/update-data.mjs
          node --check scripts/update-month-from-sources.mjs

      - name: Validate parser fixture
        run: npm run test:parser

      - name: Validate schedule logic
        run: npm run test:schedule

      - name: Validate static data files
        run: npm run test:data

      - name: Validate data quality
        run: npm run test:data-quality
