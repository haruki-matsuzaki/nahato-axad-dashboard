name: Update Nacht AXAD data

on:
  push:
    paths:
      - "data/update-trigger.json"
  schedule:
    # Primary: 12:00 / 15:00 / 18:00 JST
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
    - cron: "0 9 * * *"
    # Backup: GitHub Actions scheduled jobs can be delayed or dropped at :00.
    - cron: "7 3 * * *"
    - cron: "7 6 * * *"
    - cron: "7 9 * * *"
    - cron: "17 3 * * *"
    - cron: "17 6 * * *"
    - cron: "17 9 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "scheduled / daily / monthly / all"
        required: false
        default: "daily"
      month:
        description: "任意: YYYY-MM。指定するとその月だけ更新"
        required: false
        default: ""
      spreadsheet_id:
        description: "任意: 対象ナハトシートID。指定時は管理シート検索を省略"
        required: false
        default: ""
      force_monthly:
        description: "manual monthly/all用: 月初営業日判定を無視して実行"
        required: false
        default: "true"

concurrency:
  group: nacht-axad-data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync checkout to latest main
        if: github.ref == 'refs/heads/main'
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check automation secrets
        id: automation-secrets
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: node scripts/check-automation-secrets.mjs --profile update --failOnError

      - name: Fetch Google Sheets data
        id: fetch-data
        if: steps.automation-secrets.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 20
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ANALYSIS_ROOM_ID: ${{ secrets.CHATWORK_ANALYSIS_ROOM_ID }}
          MASTER_SPREADSHEET_ID: 1Xk-p_-6Np-e5keqOy5fcgmU-TF28H5dU7UeEYDUX_7k
          MASTER_SHEET_ID: "2127655846"
          SHEET_NAME: ◆案件/媒体別日次_全体
          TOTAL_SHEET_NAME: ◆案件別日次_全体_固定用
          SHEET_RANGE: A1:ZZ3000
          UPDATE_MODE: ${{ github.event.inputs.mode || 'scheduled' }}
          TARGET_MONTH: ${{ github.event.inputs.month }}
          SPREADSHEET_ID: ${{ github.event.inputs.spreadsheet_id }}
          FORCE_MONTHLY: ${{ github.event.inputs.force_monthly || 'false' }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set +e
          max_attempts=3
          attempt=1
          status=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Fetch attempt ${attempt}/${max_attempts}"
            node scripts/update-month-from-sources.mjs
            status=$?

            if [ "$status" -eq 0 ]; then
              echo "Fetch succeeded on attempt ${attempt}/${max_attempts}"
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Fetch failed on attempt ${attempt}/${max_attempts}. Retrying in 5 minutes."
              sleep 300
            fi

            attempt=$((attempt + 1))
          done

          echo "Fetch failed after ${max_attempts} attempts."
          exit "$status"

      - name: Backfill media-only projects
        if: steps.fetch-data.outcome == 'success'
        run: node scripts/backfill-records-from-business-sales.mjs

      - name: Check data quality
        if: steps.fetch-data.outcome == 'success'
        run: node scripts/check-data-quality.mjs --writeStatus data/data-quality-status.json --failOnError

      - name: Validate static data
        id: validate-data
        if: always()
        continue-on-error: true
        run: node scripts/validate-static-data.mjs

      - name: Commit updated data
        id: commit-data
        if: steps.fetch-data.outcome == 'success' && steps.validate-data.outcome == 'success'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git rebase --autostash origin/main
          git add data/*.json

          if git diff --cached --quiet; then
            echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "Update Nacht AXAD data"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Push failed on attempt ${attempt}/3. Rebasing latest main and retrying."
              git fetch origin main
              git rebase origin/main
              sleep 5
            fi
          done

          echo "Failed to push updated data after 3 attempts."
          exit 1

      - name: Check Cloudflare Pages deployment
        id: cloudflare-deploy
        if: steps.fetch-data.outcome == 'success' && steps.validate-data.outcome == 'success'
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          CLOUDFLARE_EXPECTED_SHA: ${{ steps.commit-data.outputs.commit_sha }}
          CLOUDFLARE_DEPLOY_WAIT_SECONDS: "600"
          CLOUDFLARE_DEPLOY_INTERVAL_SECONDS: "30"
        run: node scripts/check-cloudflare-pages-deploy.mjs

      - name: Check production site
        id: production-site
        if: steps.fetch-data.outcome == 'success' && steps.validate-data.outcome == 'success'
        continue-on-error: true
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          PRODUCTION_CHECK_REQUIRE_200: ${{ secrets.PRODUCTION_CHECK_REQUIRE_200 }}
        run: node scripts/check-production-site.mjs

      - name: Send failure email
        if: always() && (steps.automation-secrets.outcome == 'failure' || steps.fetch-data.outcome == 'failure' || steps.validate-data.outcome == 'failure' || steps.cloudflare-deploy.outcome == 'failure' || steps.production-site.outcome == 'failure')
        env:
          ALERT_EMAIL_TO: matsuzaki@shibuya-ad.com
          ALERT_REASON: update_failed
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ALERT_ROOM_ID: "398449612"
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: node scripts/send-alert-email.mjs

      - name: Fail when update failed
        if: steps.automation-secrets.outcome == 'failure' || steps.fetch-data.outcome == 'failure' || steps.validate-data.outcome == 'failure' || steps.cloudflare-deploy.outcome == 'failure' || steps.production-site.outcome == 'failure'
        run: exit 1
