name: Monitor Nacht AXAD data update

on:
  schedule:
    # 12:37 / 12:47 / 12:57 JST, and same windows for 15:00 / 18:00.
    - cron: "37 3 * * *"
    - cron: "47 3 * * *"
    - cron: "57 3 * * *"
    - cron: "37 6 * * *"
    - cron: "47 6 * * *"
    - cron: "57 6 * * *"
    - cron: "37 9 * * *"
    - cron: "47 9 * * *"
    - cron: "57 9 * * *"
  workflow_dispatch:

concurrency:
  group: nacht-axad-data-update-monitor
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  monitor-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync checkout to latest main
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Monitor scheduled update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/monitor-update-schedule.mjs --apply

      - name: Commit monitor trigger
        id: commit-monitor-trigger
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/update-trigger.json

          if git diff --cached --quiet; then
            echo "trigger_written=false" >> "$GITHUB_OUTPUT"
            echo "No monitor trigger changes to commit."
            exit 0
          fi

          git commit -m "Trigger missed Nacht AXAD update"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "trigger_written=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Push failed on attempt ${attempt}/3. Rebasing latest main and retrying."
              git fetch origin main
              git rebase origin/main
              sleep 5
            fi
          done

          echo "Failed to push monitor trigger after 3 attempts."
          exit 1

      - name: Dispatch missed update workflow
        id: dispatch-update
        if: steps.commit-monitor-trigger.outputs.trigger_written == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/dispatch-update-workflow.mjs

      - name: Send monitor trigger Chatwork alert
        if: steps.dispatch-update.outputs.dispatch_status == 'started'
        env:
          ALERT_REASON: schedule_monitor_triggered
          ALERT_RUN_URL: ${{ steps.dispatch-update.outputs.run_url }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ALERT_ROOM_ID: "398449612"
        run: node scripts/send-chatwork-alert.mjs

      - name: Send dispatch failure Chatwork alert
        if: always() && steps.commit-monitor-trigger.outputs.trigger_written == 'true' && steps.dispatch-update.outcome == 'failure'
        env:
          ALERT_REASON: schedule_monitor_failed
          ALERT_STEP_DISPATCH_UPDATE: failure
          ALERT_DISPATCH_CODE: ${{ steps.dispatch-update.outputs.dispatch_code }}
          ALERT_DISPATCH_MESSAGE: ${{ steps.dispatch-update.outputs.dispatch_message }}
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ALERT_ROOM_ID: "398449612"
        run: node scripts/send-chatwork-alert.mjs

      - name: Fail when update dispatch failed
        if: always() && steps.commit-monitor-trigger.outputs.trigger_written == 'true' && steps.dispatch-update.outcome == 'failure'
        run: exit 1
