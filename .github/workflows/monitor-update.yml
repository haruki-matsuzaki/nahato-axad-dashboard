name: Monitor Nacht AXAD data update

on:
  schedule:
    # 12:37 / 12:47 / 12:57 JST, and same windows for 15:00 / 18:00.
    - cron: "37 3 * * *"
    - cron: "47 3 * * *"
    - cron: "57 3 * * *"
    - cron: "37 6 * * *"
    - cron: "47 6 * * *"
    - cron: "57 6 * * *"
    - cron: "37 9 * * *"
    - cron: "47 9 * * *"
    - cron: "57 9 * * *"
  workflow_dispatch:

concurrency:
  group: nacht-axad-data-update-monitor
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  monitor-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync checkout to latest main
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Monitor scheduled update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/monitor-update-schedule.mjs --apply

      - name: Commit monitor trigger
        id: commit-monitor-trigger
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/update-trigger.json

          if git diff --cached --quiet; then
            echo "trigger_written=false" >> "$GITHUB_OUTPUT"
            echo "No monitor trigger changes to commit."
            exit 0
          fi

          git commit -m "Trigger missed Nacht AXAD update"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "trigger_written=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "Push failed on attempt ${attempt}/3. Rebasing latest main and retrying."
              git fetch origin main
              git rebase origin/main
              sleep 5
            fi
          done

          echo "Failed to push monitor trigger after 3 attempts."
          exit 1

      - name: Send monitor trigger email
        if: steps.commit-monitor-trigger.outputs.trigger_written == 'true'
        env:
          ALERT_EMAIL_TO: matsuzaki@shibuya-ad.com
          ALERT_REASON: schedule_monitor_triggered
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ALERT_ROOM_ID: "398449612"
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: node scripts/send-alert-email.mjs
